sources:
  - name: jaffle_shop
    description: A clone of a Postgres DB
    database: raw
    schema: jaffle_shop
    tables:
      - name: customers
        description: Raw customers data
        columns:
          - name: id
            description: Customer table primary key
            data_tests:
              - unique
              - not_null      
      - name: orders
        config:
          freshness:
            warn_after:
              count: 24
              period: hour
            error_after:
              count: 48
              period: hour
          loaded_at_field: _ETL_LOADED_AT