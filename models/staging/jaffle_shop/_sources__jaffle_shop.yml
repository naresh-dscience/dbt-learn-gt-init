sources:
  - name: jaffle_shop
    description: A replica of the postgres database
    schema: jaffle_shop
    database: raw
    config:
          freshness:
            warn_after:
              count: 10
              period: day
            error_after:
              count: 10000
              period: day
    tables:
      - name: customers
        columns:
          - name: id
            data_tests:
              - unique
              - not_null
      - name: jaffle_shop_orders
        identifier: orders
        description: one record per order
